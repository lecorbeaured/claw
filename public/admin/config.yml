backend:
  name: git-gateway
  branch: main

media_folder: "public/images/blog"
public_folder: "/images/blog"

publish_mode: editorial_workflow

site_url: https://clawai.app
display_url: https://clawai.app
logo_url: https://clawai.app/logo.png

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "blog/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "SEO-optimized title (50–60 chars ideal)" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly path, e.g. ai-assistant-tips" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "CLAW AI Team" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "AI Tips & Guides", value: "ai-tips" }
          - { label: "Product Updates", value: "product" }
          - { label: "Use Cases", value: "use-cases" }
          - { label: "Comparisons", value: "comparisons" }
          - { label: "Tutorials", value: "tutorials" }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Featured Image Alt Text", name: "image_alt", widget: "string", required: false, hint: "Describe the image for SEO and accessibility" }
      - { label: "Meta Description", name: "meta_description", widget: "string", hint: "160 chars max. Used in Google search results and social shares.", pattern: ['.{0,160}', "Must be 160 characters or fewer"] }
      - label: "Tags"
        name: "tags"
        widget: "list"
        hint: "Comma-separated tags, e.g. AI, productivity, ChatGPT alternative"
      - { label: "Canonical URL", name: "canonical_url", widget: "string", required: false, hint: "Leave blank to use default. Set if syndicating to another site." }
      - label: "Schema Type"
        name: "schema_type"
        widget: "select"
        default: "Article"
        options:
          - { label: "Article", value: "Article" }
          - { label: "How-To", value: "HowTo" }
          - { label: "FAQ", value: "FAQPage" }
          - { label: "Review", value: "Review" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown on blog index. 1–2 sentences." }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, hint: "Toggle on to save without publishing" }
