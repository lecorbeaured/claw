<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  
  <!-- Claw slash marks (3 diagonal cuts) -->
  <line x1="10" y1="7" x2="18" y2="26" stroke="#e8ff47" stroke-width="2.2" stroke-linecap="round" opacity="0.35"/>
  <line x1="14" y1="6" x2="22" y2="25" stroke="#e8ff47" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="6" x2="26" y2="25" stroke="#e8ff47" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Bold "C" letterform -->
  <text x="5" y="23" font-family="Arial Black, sans-serif" font-weight="900" font-size="20" fill="#e8ff47" letter-spacing="-1">C</text>
</svg>