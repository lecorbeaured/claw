<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLAW Blog — AI Tips, Research & Productivity</title>
  <meta name="description" content="The CLAW blog. Practical AI tips, tool comparisons, and guides for getting more done with AI.">
  <link rel="canonical" href="https://clawai.app/blog">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root{--bg:#050505;--ink:#f2ede6;--accent:#e8ff47;--muted:#888;--border:#1a1a1a;--card:#0e0e0e}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font-family:Georgia,serif;font-size:17px;line-height:1.7}
    header{background:rgba(5,5,5,.95);border-bottom:1px solid var(--border);padding:18px 40px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99}
    .logo{font-family:Arial Black,sans-serif;font-weight:900;font-size:18px;color:var(--ink);text-decoration:none}
    .logo span{color:var(--accent)}
    .cta-btn{background:var(--accent);color:#000;font-weight:700;font-size:13px;padding:9px 20px;border-radius:4px;text-decoration:none}
    main{max-width:860px;margin:0 auto;padding:80px 24px 100px}
    .blog-header{margin-bottom:60px;padding-bottom:40px;border-bottom:1px solid var(--border)}
    .label{font-family:monospace;font-size:11px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
    .blog-header h1{font-family:Arial Black,sans-serif;font-size:clamp(32px,5vw,52px);font-weight:900;letter-spacing:-1.5px;line-height:1.05}
    .blog-header p{color:var(--muted);margin-top:12px;font-size:16px}
    .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
    .post-card a{display:block;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:32px;text-decoration:none;transition:border-color .2s}
    .post-card a:hover{border-color:var(--accent)}
    .post-date{font-family:monospace;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:12px}
    .post-card h2{font-family:Arial Black,sans-serif;font-size:19px;font-weight:900;line-height:1.2;letter-spacing:-0.3px;color:var(--ink);margin-bottom:10px}
    .post-card p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:16px}
    .read-more{font-family:monospace;font-size:12px;color:var(--accent);letter-spacing:1px}
    footer{border-top:1px solid var(--border);padding:30px 40px;text-align:center;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);margin:0 12px;text-decoration:none} footer a:hover{color:var(--ink)}
    @media(max-width:600px){header{padding:14px 20px}.posts-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <a href="/" class="logo">CLAW<span>.</span></a>
  <a href="/app" class="cta-btn">Try Free →</a>
</header>
<main>
  <div class="blog-header">
    <div class="label">CLAW Blog</div>
    <h1>AI Tips &<br>Guides</h1>
    <p>0 articles on AI productivity, tools, and research.</p>
  </div>
  <div class="posts-grid">

  </div>
</main>
<footer>
  <a href="/">Home</a><a href="/blog">Blog</a><a href="/privacy">Privacy</a><a href="/terms">Terms</a>
  <span style="margin-left:16px">© 2026 CLAW</span>
</footer>
</body>
</html>
